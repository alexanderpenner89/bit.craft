name: Release Theme ZIP

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          zip -r bit.craft.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.zip"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: bit.craft v${{ steps.version.outputs.version }}
          body: "Ghost-Theme ZIP — bereit für den Upload in Ghost Admin."
          files: bit.craft.zip
          make_latest: true
